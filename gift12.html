<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  :root {
    --rose: #e8748a;
    --blush: #f4b8c5;
    --peach: #fcd5b0;
    --cream: #fff8f0;
    --gold: #d4a855;
    --green: #7aad7a;
    --deep-rose: #c0506a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--cream);
    font-family: 'Playfair Display', serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Floating flowers background ── */
  .flowers-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .petal {
    position: absolute;
    font-size: 2rem;
    animation: floatDown linear infinite;
    opacity: 0.75;
  }

  @keyframes floatDown {
    0%   { transform: translateY(-60px) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.8; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ── Corner wreaths ── */
  .wreath {
    position: fixed;
    font-size: 2.2rem;
    line-height: 1.4;
    pointer-events: none;
    z-index: 0;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
  }
  .wreath.tl { top: 10px; left: 10px; }
  .wreath.tr { top: 10px; right: 10px; text-align: right; }
  .wreath.bl { bottom: 10px; left: 10px; }
  .wreath.br { bottom: 10px; right: 10px; text-align: right; }

  /* ── Main content ── */
  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 36px;
  }

  .title-block {
    text-align: center;
  }

  .title-block h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    color: var(--deep-rose);
    text-shadow: 2px 3px 10px rgba(200,80,100,.18);
    animation: fadeDown .9s ease both;
  }

  .title-block p {
    font-style: italic;
    color: #b87a8a;
    font-size: 1.05rem;
    margin-top: 8px;
    animation: fadeDown 1.1s ease both;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Click-to-open button ── */
  .open-btn {
    background: linear-gradient(135deg, var(--rose), var(--deep-rose));
    color: #fff;
    border: none;
    padding: 18px 44px;
    border-radius: 50px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(200,80,100,.35);
    transition: transform .2s, box-shadow .2s;
    animation: pulse 2.4s ease-in-out infinite;
    position: relative;
  }

  .open-btn:hover {
    transform: scale(1.07);
    box-shadow: 0 12px 36px rgba(200,80,100,.45);
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 8px 28px rgba(200,80,100,.35); }
    50%       { box-shadow: 0 8px 40px rgba(200,80,100,.6); }
  }

  /* ── Overlay / modal ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(30, 10, 20, .72);
    backdrop-filter: blur(6px);
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.active { display: flex; }

  /* ── Puzzle modal ── */
  #puzzleModal {
    background: linear-gradient(160deg, #fff8f5 0%, #fce8ed 100%);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: 0 24px 70px rgba(200,80,100,.3);
    max-width: 480px;
    width: 100%;
    text-align: center;
    position: relative;
  }

  #puzzleModal h2 {
    font-family: 'Dancing Script', cursive;
    font-size: 1.9rem;
    color: var(--deep-rose);
    margin-bottom: 18px;
  }

  .close-btn {
    position: absolute;
    top: 14px; right: 18px;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #c07080;
    line-height: 1;
  }

  /* ── Puzzle grid ── */
  #puzzleGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    width: 100%;
    aspect-ratio: 1;
    border: 3px solid var(--blush);
    border-radius: 12px;
    overflow: hidden;
    background: var(--blush);
    cursor: grab;
    touch-action: none;
  }

  .piece {
    background-size: 300% 300%;
    cursor: pointer;
    transition: opacity .15s, box-shadow .15s;
    position: relative;
    border: 1px solid rgba(255,255,255,.4);
    user-select: none;
  }

  .piece.selected {
    box-shadow: inset 0 0 0 4px var(--gold);
    opacity: .85;
  }

  .piece.empty {
    background: linear-gradient(135deg, #fce0e8 0%, #ffe5d5 100%) !important;
    cursor: default;
  }

  .hint {
    font-size: .82rem;
    color: #b07080;
    margin-top: 12px;
    font-style: italic;
  }

  /* ── Celebration / video modal ── */
  #celebModal {
    background: #000;
    border-radius: 20px;
    padding: 0;
    max-width: 560px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 24px 70px rgba(0,0,0,.6);
    position: relative;
  }

  .hb-label {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 10;
    text-align: center;
    padding: 12px 8px 0;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    color: #fff;
    text-shadow: 0 0 20px rgba(255,180,50,.9), 0 2px 8px rgba(0,0,0,.6);
    letter-spacing: .04em;
    animation: hbGlow 1.6s ease-in-out infinite alternate;
    pointer-events: none;
  }

  @keyframes hbGlow {
    from { text-shadow: 0 0 12px #ffcc44, 0 2px 8px rgba(0,0,0,.5); }
    to   { text-shadow: 0 0 32px #ff88aa, 0 0 60px #ffcc44, 0 2px 8px rgba(0,0,0,.5); }
  }

  #birthdayVideo {
    width: 100%;
    display: block;
    max-height: 70vh;
    object-fit: cover;
  }

  .confetti-ring {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    border-radius: 20px;
  }

  .conf {
    position: absolute;
    width: 10px; height: 10px;
    border-radius: 2px;
    animation: confettiFall 3s linear infinite;
    opacity: 0;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110%) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- Floating petals background -->
<div class="flowers-bg" id="flowersBg"></div>

<!-- Corner wreaths -->
<div class="wreath tl">🌸🌷<br>🌺🌼</div>
<div class="wreath tr">🌷🌸<br>🌼🌺</div>
<div class="wreath bl">🌺🌼<br>🌸🌷</div>
<div class="wreath br">🌼🌺<br>🌷🌸</div>

<!-- Main page -->
<div class="container">
  <div class="title-block">
    <h1>✨ A Little Surprise Awaits ✨</h1>
    <p>Solve the puzzle to reveal something special 🌸</p>
  </div>
  <button class="open-btn" onclick="openPuzzle()">🌺 Click to Open 🌺</button>
</div>

<!-- PUZZLE MODAL -->
<div class="overlay" id="puzzleOverlay">
  <div id="puzzleModal">
    <button class="close-btn" onclick="closeAll()">✕</button>
    <h2>🧩 Solve to Reveal 🧩</h2>
    <div id="puzzleGrid"></div>
    <p class="hint">Tap a piece, then tap where it should go ✨</p>
  </div>
</div>

<!-- CELEBRATION MODAL -->
<div class="overlay" id="celebOverlay">
  <div id="celebModal">
    <div class="hb-label">🎂 Happy Birthday — 6 Days to Go! 🎂</div>
    <div class="confetti-ring" id="confettiRing"></div>
    <video id="birthdayVideo" autoplay controls playsinline>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</div>

<audio id="bgSong" src="song2.mp3" loop></audio>

<script>
// ── Floating petals ──────────────────────────────
const emojis = ['🌸','🌷','🌺','🌼','🪷','💮','🌹','🏵️'];
const bg = document.getElementById('flowersBg');
for (let i = 0; i < 28; i++) {
  const d = document.createElement('div');
  d.className = 'petal';
  d.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  d.style.left = Math.random() * 100 + 'vw';
  d.style.fontSize = (1.2 + Math.random() * 1.8) + 'rem';
  d.style.animationDuration = (7 + Math.random() * 10) + 's';
  d.style.animationDelay = (-Math.random() * 12) + 's';
  bg.appendChild(d);
}

// ── Puzzle logic ─────────────────────────────────
const N = 3;
let tiles = [];   // 0..8, where 8 = empty
let selected = null;

function shuffle(arr) {
  // Fisher-Yates, keep solvability (just do even # swaps)
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  // Make sure it's solvable: count inversions; if odd, swap first two non-empty
  let inv = 0;
  for (let i = 0; i < arr.length - 1; i++)
    for (let j = i + 1; j < arr.length; j++)
      if (arr[i] !== 8 && arr[j] !== 8 && arr[i] > arr[j]) inv++;
  if (inv % 2 !== 0) { let t=arr[0]; arr[0]=arr[1]; arr[1]=t; }
  return arr;
}

function buildPuzzle() {
  tiles = shuffle([0,1,2,3,4,5,6,7,8]);
  renderPuzzle();
}

function renderPuzzle() {
  const grid = document.getElementById('puzzleGrid');
  grid.innerHTML = '';
  tiles.forEach((t, idx) => {
    const div = document.createElement('div');
    div.className = 'piece' + (t === 8 ? ' empty' : '');
    div.dataset.idx = idx;
    if (t !== 8) {
      const col = (t % N) * (100/N);
      const row = Math.floor(t / N) * (100/N);
      div.style.backgroundImage = "url('photo2.jpg')";
      div.style.backgroundSize  = '300% 300%';
      div.style.backgroundPosition = col + '% ' + row + '%';
    }
    div.addEventListener('click', () => onPieceClick(idx));
    grid.appendChild(div);
  });
}

function onPieceClick(idx) {
  if (tiles[idx] === 8) return;   // clicked empty cell

  if (selected === null) {
    selected = idx;
    document.querySelectorAll('.piece')[idx].classList.add('selected');
  } else {
    if (selected === idx) {
      // deselect
      document.querySelectorAll('.piece')[idx].classList.remove('selected');
      selected = null;
      return;
    }
    // swap
    [tiles[selected], tiles[idx]] = [tiles[idx], tiles[selected]];
    selected = null;
    renderPuzzle();
    checkWin();
  }
}

function checkWin() {
  const solved = tiles.every((v, i) => v === i);
  if (solved) {
    setTimeout(() => {
      document.getElementById('puzzleOverlay').classList.remove('active');
      showCelebration();
    }, 400);
  }
}

function openPuzzle() {
  document.getElementById('puzzleOverlay').classList.add('active');
  buildPuzzle();
}

function closeAll() {
  document.getElementById('puzzleOverlay').classList.remove('active');
  document.getElementById('celebOverlay').classList.remove('active');
  document.getElementById('bgSong').pause();
  document.getElementById('bgSong').currentTime = 0;
  document.getElementById('birthdayVideo').pause();
}

// ── Celebration ───────────────────────────────────
function showCelebration() {
  document.getElementById('celebOverlay').classList.add('active');
  // Play song
  const song = document.getElementById('bgSong');
  song.volume = 0.6;
  song.play().catch(()=>{});
  // Video
  const vid = document.getElementById('birthdayVideo');
  vid.play().catch(()=>{});
  // Confetti
  spawnConfetti();
}

const confColors = ['#e8748a','#f4b8c5','#fcd5b0','#d4a855','#7aad7a','#fff','#c879d0'];
function spawnConfetti() {
  const ring = document.getElementById('confettiRing');
  ring.innerHTML = '';
  for (let i = 0; i < 45; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    c.style.left = Math.random() * 100 + '%';
    c.style.background = confColors[Math.floor(Math.random() * confColors.length)];
    c.style.animationDelay = (Math.random() * 2.5) + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.width = c.style.height = (7 + Math.random() * 9) + 'px';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    ring.appendChild(c);
  }
}

// Close overlay when clicking outside modal
document.getElementById('puzzleOverlay').addEventListener('click', function(e){
  if (e.target === this) closeAll();
});
document.getElementById('celebOverlay').addEventListener('click', function(e){
  if (e.target === this) closeAll();
});
</script>
</body>
</html>
