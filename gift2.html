<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gift 1 🎁</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#2c003e,#10001a);
  font-family:'Georgia',serif;
  color:#fff;
  overflow:hidden;
}

h1{
  font-size:3rem;
  text-shadow:2px 2px 12px gold;
  text-align:center;
  margin-bottom:50px;
}

/* carousel container */

.carousel-container{
  position:relative;
  width:500px;
  height:500px;
}

/* images */

.carousel-container img{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid gold;
  box-shadow:0 0 20px gold;

  opacity:0;
  transform:scale(0.5);
  transition:opacity 1.5s ease, transform 1.5s ease;
}

/* visible class */

.carousel-container img.show{
  opacity:1;
  transform:scale(1);
}

</style>
</head>

<body>

<div>
<h1>🎉 Happy Day 1, Kittu! Your Royal Gift Awaits 🎁</h1>
<div class="carousel-container" id="carousel"></div>
</div>

<script>

const totalImages = 15;
const carousel = document.getElementById('carousel');

const radius = 180;
const centerX = 200;
const centerY = 200;

/* create images */

for(let i=1;i<=totalImages;i++){

  const img=document.createElement('img');
  img.src=`images/gift1-${i}.jpg`;
  carousel.appendChild(img);

}

/* position them in circle */

function positionImages(){

  const images=carousel.querySelectorAll('img');
  const angleStep=(2*Math.PI)/totalImages;

  images.forEach((img,index)=>{

    const angle=index*angleStep;

    const x=centerX+radius*Math.cos(angle)-60;
    const y=centerY+radius*Math.sin(angle)-60;

    img.style.left=x+"px";
    img.style.top=y+"px";

  });

}

positionImages();

/* show images one by one */

const images=carousel.querySelectorAll("img");

images.forEach((img,index)=>{

  setTimeout(()=>{

    img.classList.add("show");

  }, index*1000);   // 1 second delay between images

});

</script>

</body>
</html>
