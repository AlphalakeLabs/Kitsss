<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kittu's Birthday Countdown 🎉</title>
<style>
  body { display:flex; justify-content:center; align-items:center; height:100vh; 
    background: linear-gradient(135deg,#f093fb,#f5576c); font-family:'Comic Sans MS', cursive; margin:0; color:#fff; text-align:center;}
  .countdown {background: rgba(0,0,0,0.3); padding:50px; border-radius:25px; box-shadow:0 0 20px #fff;}
  .days {font-size:5rem; font-weight:bold; color:#fffb00; animation: rainbow 3s infinite linear;}
  @keyframes rainbow {0%{color:#ff0000;}20%{color:#ff7f00;}40%{color:#ffff00;}60%{color:#00ff00;}80%{color:#0000ff;}100%{color:#8b00ff;}}
  button {padding:15px 30px; font-size:1.5rem; margin-top:30px; cursor:pointer; border:none; border-radius:10px; background:#ff0; color:#000;}
  button:hover {background:#fff;}
</style>
</head>
<body>

<div class="countdown">
  <h1>Kittu's Birthday Countdown 🎉</h1>
  <div class="days" id="days">17</div>
  <div>Days Left!</div>
  <button id="giftBtn">🎁 Open Today's Gift</button>
</div>

<script>
  // Birthday date: 22nd March
  const birthday = new Date();
  birthday.setFullYear(new Date().getFullYear());
  birthday.setMonth(2); // March
  birthday.setDate(22);
  birthday.setHours(0,0,0,0);

  const daysEl = document.getElementById('days');

  function updateCountdown() {
    const now = new Date();
    const diff = birthday - now;
    const daysLeft = Math.ceil(diff / (1000*60*60*24));
    daysEl.textContent = daysLeft>0 ? daysLeft : 0;
  }

  setInterval(updateCountdown,1000);

  // Gift Button logic
  document.getElementById('giftBtn').addEventListener('click', function(){
    const now = new Date();
    const diff = birthday - now;
    const dayNumber = Math.ceil(diff / (1000*60*60*24)); // days left
    const totalDays = 17; // adjust if more gifts
    let giftNumber = totalDays - dayNumber + 1; // 1 = first gift
    if(giftNumber < 1) giftNumber = 1; // minimum gift
    if(giftNumber > totalDays) giftNumber = totalDays;
    
    // open gift page
    window.open('gift' + giftNumber + '.html', '_blank');
  });
</script>

</body>
</html>
